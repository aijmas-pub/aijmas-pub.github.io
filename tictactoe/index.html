<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tic-Tac-Toe</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a22; --accent: #4ade80; --accent-2: #22d3ee;
    --text: #e5e7eb; --muted: #9ca3af; --x: #22d3ee; --o: #f472b6;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030 0%, var(--bg) 60%);
    color: var(--text);
  }
  .app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  h1 {
    font-size: 28px; margin: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  a.back { color: var(--muted); text-decoration: none; font-size: 14px; }
  a.back:hover { color: var(--accent); }
  .hud { display: flex; gap: 12px; margin-bottom: 14px; align-items: center; }
  .chip { background: var(--panel); padding: 8px 14px; border-radius: 10px; font-size: 14px; color: var(--muted); }
  .chip b { color: var(--text); }
  button {
    background: var(--panel); color: var(--text); border: 1px solid #262b37;
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 14px;
  }
  button:hover { border-color: var(--accent); }
  select { background: var(--panel); color: var(--text); border: 1px solid #262b37; padding: 8px 10px; border-radius: 10px; }
  .board {
    width: min(90vw, 360px); aspect-ratio: 1/1;
    display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
    gap: 8px; background: #1c2130; padding: 8px; border-radius: 12px;
  }
  .sq {
    background: #242a3b; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 56px; font-weight: 700; cursor: pointer; user-select: none;
    transition: background .12s;
  }
  .sq:hover { background: #2c3347; }
  .sq.x { color: var(--x); }
  .sq.o { color: var(--o); }
  .sq.win { background: #2b3b2d; }
  .msg { margin-top: 14px; color: var(--muted); font-size: 14px; min-height: 20px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Tic-Tac-Toe</h1>
    <a class="back" href="../">← all games</a>
  </header>
  <div class="hud">
    <div class="chip">X: <b id="sx">0</b></div>
    <div class="chip">O: <b id="so">0</b></div>
    <div class="chip">Draw: <b id="sd">0</b></div>
    <select id="mode">
      <option value="ai">vs Computer</option>
      <option value="pvp">2 Players</option>
    </select>
    <button id="reset">Reset</button>
  </div>
  <div class="board" id="board"></div>
  <div class="msg" id="msg">X's turn.</div>
</div>
<script>
const board = document.getElementById('board');
const msgEl = document.getElementById('msg');
const modeEl = document.getElementById('mode');
const LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
let cells, turn, over, scores = {X:0,O:0,D:0};

function build() {
  board.innerHTML = '';
  cells = Array(9).fill('');
  for (let i=0;i<9;i++) {
    const d = document.createElement('div');
    d.className = 'sq';
    d.dataset.i = i;
    d.onclick = () => play(i);
    board.appendChild(d);
  }
}
function reset() {
  build();
  turn = 'X'; over = false;
  msgEl.textContent = "X's turn.";
}
function render(winLine) {
  [...board.children].forEach((el,i) => {
    el.textContent = cells[i];
    el.classList.toggle('x', cells[i]==='X');
    el.classList.toggle('o', cells[i]==='O');
    el.classList.toggle('win', winLine && winLine.includes(i));
  });
}
function checkWin(b) {
  for (const L of LINES) {
    const [a,b1,c] = L;
    if (b[a] && b[a]===b[b1] && b[a]===b[c]) return {winner: b[a], line: L};
  }
  if (b.every(v=>v)) return {winner: 'D'};
  return null;
}
function play(i) {
  if (over || cells[i]) return;
  cells[i] = turn;
  const res = checkWin(cells);
  if (res) return finish(res);
  turn = turn === 'X' ? 'O' : 'X';
  render();
  msgEl.textContent = turn + "'s turn.";
  if (modeEl.value === 'ai' && turn === 'O' && !over) setTimeout(aiMove, 200);
}
function finish(res) {
  over = true;
  render(res.line);
  if (res.winner === 'D') { scores.D++; msgEl.textContent = "Draw."; }
  else { scores[res.winner]++; msgEl.textContent = res.winner + " wins!"; }
  document.getElementById('sx').textContent = scores.X;
  document.getElementById('so').textContent = scores.O;
  document.getElementById('sd').textContent = scores.D;
}
function aiMove() {
  const best = minimax(cells.slice(), 'O');
  cells[best.idx] = 'O';
  const res = checkWin(cells);
  if (res) return finish(res);
  turn = 'X';
  render();
  msgEl.textContent = "X's turn.";
}
function minimax(b, player) {
  const res = checkWin(b);
  if (res) {
    if (res.winner === 'O') return {score: 10};
    if (res.winner === 'X') return {score: -10};
    return {score: 0};
  }
  const moves = [];
  for (let i=0;i<9;i++) {
    if (!b[i]) {
      b[i] = player;
      const r = minimax(b, player === 'O' ? 'X' : 'O');
      moves.push({idx: i, score: r.score});
      b[i] = '';
    }
  }
  if (player === 'O') return moves.reduce((a,m)=>m.score>a.score?m:a, {score:-Infinity});
  return moves.reduce((a,m)=>m.score<a.score?m:a, {score:Infinity});
}
document.getElementById('reset').onclick = reset;
modeEl.onchange = reset;
reset();
</script>
</body>
</html>
