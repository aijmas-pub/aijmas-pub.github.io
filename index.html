<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Games</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --accent: #4ade80;
    --accent-2: #22d3ee;
    --text: #e5e7eb;
    --muted: #9ca3af;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030 0%, var(--bg) 60%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  .app {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 16px;
  }
  h1 {
    font-size: 36px; margin: 0 0 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p.sub { color: var(--muted); margin: 0 0 32px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    width: 100%; max-width: 720px;
  }
  a.card {
    display: block; padding: 24px; border-radius: 14px;
    background: var(--panel); color: var(--text);
    text-decoration: none; border: 1px solid #262b37;
    transition: transform .15s, border-color .15s;
  }
  a.card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card h2 { margin: 0 0 6px; font-size: 20px; }
  .card p { margin: 0; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <h1>Games</h1>
  <p class="sub">Pick a game.</p>
  <div class="grid">
    <a class="card" href="snake/"><h2>Snake</h2><p>Eat, grow, don't crash.</p></a>
    <a class="card" href="2048/"><h2>2048</h2><p>Merge tiles to 2048.</p></a>
    <a class="card" href="tictactoe/"><h2>Tic-Tac-Toe</h2><p>Three in a row.</p></a>
    <a class="card" href="minesweeper/"><h2>Minesweeper</h2><p>Clear the field.</p></a>
  </div>
</div>
</body>
</html>
