<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --accent: #4ade80;
    --accent-2: #22d3ee;
    --text: #e5e7eb;
    --muted: #9ca3af;
    --danger: #f87171;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030 0%, var(--bg) 60%);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .app {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: 28px;
    letter-spacing: 0.5px;
    margin: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
  }

  .board {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    width: min(520px, 100%);
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-variant-numeric: tabular-nums;
  }

  .hud .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hud .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .hud .value {
    font-size: 22px;
    font-weight: 600;
  }

  .hud .best .value { color: var(--accent-2); }
  .hud .score .value { color: var(--accent); }

  canvas {
    display: block;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: #0b0d12;
    border-radius: 12px;
    touch-action: none;
  }

  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
  }

  .buttons {
    display: flex;
    gap: 8px;
  }

  button {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0b0d12;
    border: none;
    padding: 10px 16px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.2s ease;
  }

  button:hover { box-shadow: 0 6px 18px rgba(74,222,128,0.25); }
  button:active { transform: translateY(1px); }

  button.ghost {
    background: transparent;
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.12);
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(10,12,16,0.72);
    backdrop-filter: blur(4px);
    border-radius: 12px;
  }

  .overlay.show { display: flex; }

  .overlay .card {
    text-align: center;
    padding: 20px 24px;
  }

  .overlay h2 {
    margin: 0 0 6px;
    font-size: 22px;
  }

  .overlay p {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 13px;
  }

  .canvas-wrap {
    position: relative;
  }

  /* Mobile touch pad */
  .touchpad {
    display: none;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 14px;
    user-select: none;
  }

  .touchpad .pad {
    aspect-ratio: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: var(--muted);
  }

  .touchpad .pad:active { background: rgba(255,255,255,0.1); }
  .touchpad .empty { visibility: hidden; }

  @media (hover: none) and (pointer: coarse) {
    .touchpad { display: grid; }
    .hint.keys { display: none; }
  }

  footer {
    margin-top: 24px;
    color: var(--muted);
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Snake</h1>
    <span class="subtitle">arrow keys or WASD</span>
  </header>

  <div class="board">
    <div class="hud">
      <div class="stat score">
        <span class="label">Score</span>
        <span class="value" id="score">0</span>
      </div>
      <div class="stat best">
        <span class="label">Best</span>
        <span class="value" id="best">0</span>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="480" height="480"></canvas>
      <div class="overlay" id="overlay">
        <div class="card">
          <h2 id="overlayTitle">Ready?</h2>
          <p id="overlayText">Press any arrow key or tap Start.</p>
          <button id="startBtn">Start</button>
        </div>
      </div>
    </div>

    <div class="controls">
      <span class="hint keys">Space = pause · R = restart</span>
      <div class="buttons">
        <button class="ghost" id="pauseBtn">Pause</button>
        <button class="ghost" id="restartBtn">Restart</button>
      </div>
    </div>

    <div class="touchpad" id="touchpad">
      <div class="pad empty"></div>
      <div class="pad" data-dir="up">↑</div>
      <div class="pad empty"></div>
      <div class="pad" data-dir="left">←</div>
      <div class="pad empty"></div>
      <div class="pad" data-dir="right">→</div>
      <div class="pad empty"></div>
      <div class="pad" data-dir="down">↓</div>
      <div class="pad empty"></div>
    </div>
  </div>

  <footer>Built for GitHub Pages · single-file HTML</footer>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const restartBtn = document.getElementById('restartBtn');
  const touchpad = document.getElementById('touchpad');

  const GRID = 20;
  const CELL = canvas.width / GRID;
  const BASE_SPEED = 8;      // moves per second at start
  const MAX_SPEED = 18;
  const SPEED_RAMP = 0.25;   // extra moves/sec per food

  const STATE = { READY: 'ready', PLAYING: 'playing', PAUSED: 'paused', OVER: 'over' };

  let snake, dir, queuedDir, food, score, best, state, lastStepTime, stepInterval;

  best = Number(localStorage.getItem('snake_best') || 0);
  bestEl.textContent = best;

  function reset() {
    const mid = Math.floor(GRID / 2);
    snake = [
      { x: mid - 1, y: mid },
      { x: mid, y: mid },
      { x: mid + 1, y: mid },
    ];
    dir = { x: 1, y: 0 };
    queuedDir = dir;
    score = 0;
    scoreEl.textContent = score;
    stepInterval = 1000 / BASE_SPEED;
    placeFood();
    state = STATE.READY;
    showOverlay('Ready?', 'Press any arrow key or tap Start.');
    draw();
  }

  function placeFood() {
    while (true) {
      const f = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) {
        food = f;
        return;
      }
    }
  }

  function showOverlay(title, text) {
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    startBtn.textContent = state === STATE.OVER ? 'Play Again' : 'Start';
    overlay.classList.add('show');
  }

  function hideOverlay() {
    overlay.classList.remove('show');
  }

  function start() {
    if (state === STATE.OVER) reset();
    state = STATE.PLAYING;
    hideOverlay();
    lastStepTime = performance.now();
    requestAnimationFrame(loop);
  }

  function pause() {
    if (state !== STATE.PLAYING) return;
    state = STATE.PAUSED;
    showOverlay('Paused', 'Press space or Start to resume.');
  }

  function gameOver() {
    state = STATE.OVER;
    if (score > best) {
      best = score;
      localStorage.setItem('snake_best', String(best));
      bestEl.textContent = best;
    }
    showOverlay('Game Over', `Score ${score} · Best ${best}`);
  }

  function setDirection(nx, ny) {
    // prevent reversing into self
    if (snake.length > 1 && dir.x === -nx && dir.y === -ny) return;
    queuedDir = { x: nx, y: ny };
    if (state === STATE.READY) start();
  }

  function step() {
    dir = queuedDir;
    const head = snake[snake.length - 1];
    const next = { x: head.x + dir.x, y: head.y + dir.y };

    if (next.x < 0 || next.x >= GRID || next.y < 0 || next.y >= GRID) {
      gameOver();
      return;
    }
    if (snake.some(s => s.x === next.x && s.y === next.y)) {
      gameOver();
      return;
    }

    snake.push(next);

    if (next.x === food.x && next.y === food.y) {
      score += 1;
      scoreEl.textContent = score;
      const newSpeed = Math.min(MAX_SPEED, BASE_SPEED + score * SPEED_RAMP);
      stepInterval = 1000 / newSpeed;
      placeFood();
    } else {
      snake.shift();
    }
  }

  function loop(now) {
    if (state !== STATE.PLAYING) return;
    if (now - lastStepTime >= stepInterval) {
      lastStepTime = now;
      step();
    }
    draw();
    requestAnimationFrame(loop);
  }

  function draw() {
    // background with subtle grid
    ctx.fillStyle = '#0b0d12';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0);
      ctx.lineTo(i * CELL, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL);
      ctx.lineTo(canvas.width, i * CELL);
      ctx.stroke();
    }

    // food (glowing dot)
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    const grad = ctx.createRadialGradient(fx, fy, 1, fx, fy, CELL * 0.9);
    grad.addColorStop(0, 'rgba(248, 113, 113, 1)');
    grad.addColorStop(0.5, 'rgba(248, 113, 113, 0.6)');
    grad.addColorStop(1, 'rgba(248, 113, 113, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(food.x * CELL - 4, food.y * CELL - 4, CELL + 8, CELL + 8);
    ctx.fillStyle = '#f87171';
    roundRect(ctx, food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6, 4);
    ctx.fill();

    // snake
    for (let i = 0; i < snake.length; i++) {
      const s = snake[i];
      const t = i / snake.length;
      const r = Math.round(34 + (74 - 34) * t);
      const g = Math.round(211 + (222 - 211) * t);
      const b = Math.round(238 + (128 - 238) * t);
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      roundRect(ctx, s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4, 5);
      ctx.fill();
    }

    // eyes on head
    const head = snake[snake.length - 1];
    ctx.fillStyle = '#0b0d12';
    const eyeSize = 2.5;
    const cx = head.x * CELL + CELL / 2;
    const cy = head.y * CELL + CELL / 2;
    const off = 4;
    const ex1 = cx + dir.y * off - dir.x * 2;
    const ey1 = cy - dir.x * off - dir.y * 2;
    const ex2 = cx - dir.y * off - dir.x * 2;
    const ey2 = cy + dir.x * off - dir.y * 2;
    ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // input
  window.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'arrowup' || k === 'w') { setDirection(0, -1); e.preventDefault(); }
    else if (k === 'arrowdown' || k === 's') { setDirection(0, 1); e.preventDefault(); }
    else if (k === 'arrowleft' || k === 'a') { setDirection(-1, 0); e.preventDefault(); }
    else if (k === 'arrowright' || k === 'd') { setDirection(1, 0); e.preventDefault(); }
    else if (k === ' ') {
      if (state === STATE.PLAYING) pause();
      else if (state === STATE.PAUSED || state === STATE.READY) start();
      e.preventDefault();
    }
    else if (k === 'r') { reset(); }
  });

  startBtn.addEventListener('click', start);
  pauseBtn.addEventListener('click', () => {
    if (state === STATE.PLAYING) pause();
    else if (state === STATE.PAUSED) start();
  });
  restartBtn.addEventListener('click', reset);

  touchpad.addEventListener('click', (e) => {
    const t = e.target.closest('.pad');
    if (!t) return;
    const d = t.dataset.dir;
    if (d === 'up') setDirection(0, -1);
    else if (d === 'down') setDirection(0, 1);
    else if (d === 'left') setDirection(-1, 0);
    else if (d === 'right') setDirection(1, 0);
  });

  // swipe support on the canvas
  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStart = { x: t.clientX, y: t.clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStart.x;
    const dy = t.clientY - touchStart.y;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  reset();
})();
</script>
</body>
</html>
