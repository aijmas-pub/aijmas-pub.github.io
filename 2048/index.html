<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>2048</title>
<style>
  :root {
    --bg: #0f1115; --panel: #161a22; --accent: #4ade80; --accent-2: #22d3ee;
    --text: #e5e7eb; --muted: #9ca3af;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030 0%, var(--bg) 60%);
    color: var(--text);
  }
  .app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 16px; }
  h1 {
    font-size: 28px; margin: 0;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  a.back { color: var(--muted); text-decoration: none; font-size: 14px; }
  a.back:hover { color: var(--accent); }
  .hud { display: flex; gap: 12px; margin-bottom: 12px; }
  .chip { background: var(--panel); padding: 8px 14px; border-radius: 10px; font-size: 14px; color: var(--muted); }
  .chip b { color: var(--text); }
  button {
    background: var(--panel); color: var(--text); border: 1px solid #262b37;
    padding: 8px 14px; border-radius: 10px; cursor: pointer; font-size: 14px;
  }
  button:hover { border-color: var(--accent); }
  .board {
    position: relative;
    width: min(92vw, 420px); aspect-ratio: 1/1;
    background: #1c2130; border-radius: 12px; padding: 10px;
    display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
    gap: 10px;
    touch-action: none;
  }
  .cell { background: #242a3b; border-radius: 8px; }
  .tile {
    position: absolute; display: flex; align-items: center; justify-content: center;
    font-weight: 700; border-radius: 8px; color: #1b1f2a;
    transition: transform .12s ease, background-color .12s;
  }
  .msg { margin-top: 14px; color: var(--muted); font-size: 14px; min-height: 20px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>2048</h1>
    <a class="back" href="../">← all games</a>
  </header>
  <div class="hud">
    <div class="chip">Score: <b id="score">0</b></div>
    <div class="chip">Best: <b id="best">0</b></div>
    <button id="reset">New Game</button>
  </div>
  <div class="board" id="board">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
  </div>
  <div class="msg" id="msg">Arrow keys or swipe.</div>
</div>
<script>
const SIZE = 4;
const COLORS = {
  2:'#eee4da',4:'#ede0c8',8:'#f2b179',16:'#f59563',32:'#f67c5f',64:'#f65e3b',
  128:'#edcf72',256:'#edcc61',512:'#edc850',1024:'#edc53f',2048:'#edc22e'
};
let grid, score, best = +(localStorage.getItem('2048-best')||0);
const boardEl = document.getElementById('board');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
document.getElementById('reset').onclick = reset;

function reset() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  addRandom(); addRandom();
  render();
  msgEl.textContent = 'Arrow keys or swipe.';
}
function addRandom() {
  const empty = [];
  for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) if (!grid[r][c]) empty.push([r,c]);
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}
function render() {
  boardEl.querySelectorAll('.tile').forEach(t=>t.remove());
  const rect = boardEl.getBoundingClientRect();
  const pad = 10;
  const cell = (rect.width - pad*2 - 10*3) / 4;
  for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) {
    const v = grid[r][c];
    if (!v) continue;
    const t = document.createElement('div');
    t.className = 'tile';
    t.textContent = v;
    t.style.width = cell+'px';
    t.style.height = cell+'px';
    t.style.fontSize = (v < 100 ? cell*0.45 : v < 1000 ? cell*0.38 : cell*0.3) + 'px';
    t.style.background = COLORS[v] || '#3c3a32';
    t.style.color = v > 4 ? '#f9f6f2' : '#1b1f2a';
    t.style.transform = `translate(${pad + c*(cell+10)}px, ${pad + r*(cell+10)}px)`;
    boardEl.appendChild(t);
  }
  scoreEl.textContent = score;
  if (score > best) { best = score; localStorage.setItem('2048-best', best); }
  bestEl.textContent = best;
}
function slide(row) {
  const arr = row.filter(v=>v);
  for (let i=0;i<arr.length-1;i++) {
    if (arr[i] === arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); }
  }
  while (arr.length < SIZE) arr.push(0);
  return arr;
}
function move(dir) {
  const prev = JSON.stringify(grid);
  if (dir === 'L') grid = grid.map(slide);
  else if (dir === 'R') grid = grid.map(r => slide(r.slice().reverse()).reverse());
  else if (dir === 'U') {
    for (let c=0;c<SIZE;c++) {
      const col = slide(grid.map(r=>r[c]));
      for (let r=0;r<SIZE;r++) grid[r][c] = col[r];
    }
  } else if (dir === 'D') {
    for (let c=0;c<SIZE;c++) {
      const col = slide(grid.map(r=>r[c]).reverse()).reverse();
      for (let r=0;r<SIZE;r++) grid[r][c] = col[r];
    }
  }
  if (JSON.stringify(grid) !== prev) {
    addRandom();
    render();
    if (isGameOver()) msgEl.textContent = 'Game over. Press New Game.';
  }
}
function isGameOver() {
  for (let r=0;r<SIZE;r++) for (let c=0;c<SIZE;c++) {
    if (!grid[r][c]) return false;
    if (c<SIZE-1 && grid[r][c]===grid[r][c+1]) return false;
    if (r<SIZE-1 && grid[r][c]===grid[r+1][c]) return false;
  }
  return true;
}
window.addEventListener('keydown', e => {
  const map = {ArrowLeft:'L',ArrowRight:'R',ArrowUp:'U',ArrowDown:'D'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});
let tx=0, ty=0;
boardEl.addEventListener('touchstart', e => { const t=e.touches[0]; tx=t.clientX; ty=t.clientY; }, {passive:true});
boardEl.addEventListener('touchend', e => {
  const t=e.changedTouches[0]; const dx=t.clientX-tx, dy=t.clientY-ty;
  if (Math.max(Math.abs(dx),Math.abs(dy)) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) move(dx>0?'R':'L'); else move(dy>0?'D':'U');
});
window.addEventListener('resize', render);
reset();
</script>
</body>
</html>
